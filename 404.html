      font-size: 14px; font-weight: 500; transition: all 0.2s;
    }
    .links .primary {
      background: var(--accent); color: #000;
    }
    .links .primary:hover { opacity: 0.9; }
    .links .secondary {
      background: var(--bg-card); border: 1px solid var(--border); color: var(--text-2);

    .links .secondary:hover { border-color: var(--accent); color: var(--text); }
    .helpful { margin-top: 48px; padding-top: 32px; border-top: 1px solid var(--border); }
    .helpful__title { font-size: 13px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }
    .helpful__grid { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .helpful__grid a {

    .helpful__grid a:hover { border-color: var(--accent); color: var(--text); }

    .footer { padding: 24px 0; border-top: 1px solid var(--border); text-align: center; font-size: 13px; color: var(--text-3); }

    @media (max-width: 600px) {
      .code { font-size: 80px; }

      .content { padding: 60px 20px; }
